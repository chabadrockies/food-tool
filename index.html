<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Internal food order entry tool">
  <title>Chabad Food | Order Entry</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <nav class="date-nav" aria-label="Order date navigation">
      <button id="previous-date" class="w3-button nav-button" type="button" aria-label="Previous order date">‹ Previous</button>
      <input id="order-date" class="w3-input w3-border" type="date" aria-label="Order date">
      <button id="next-date" class="w3-button nav-button" type="button" aria-label="Next order date">Next ›</button>
      <button id="new-date" class="w3-button new-button" type="button">+ New date</button>
    </nav>

    <div class="app-layout">
      <section class="menu-area" aria-label="Menu">
        <p id="active-date-message" class="date-title"></p>
        <div id="menu"></div>
      </section>

      <aside class="totals-panel w3-white w3-card-2" aria-labelledby="totals-heading">
        <div class="totals-heading"><h1 id="totals-heading">Totals by date</h1></div>
        <div id="date-totals"></div>
        <div class="grand-total"><span>All dates total</span><span id="grand-total">$0</span></div>
      </aside>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
